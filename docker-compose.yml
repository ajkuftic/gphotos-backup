services:

  # Headless backup — runs anywhere after auth
  gphotos-backup:
    image: ajkuftic/gphotos-backup:latest
    # build: .
    volumes:
      - ./config:/config   # browser-data/ lives here (saved session)
      - ./data:/data        # photos downloaded to data/photos/YYYY/MM/
    environment:
      - PYTHONUNBUFFERED=1

  # Headed auth — run once on a LOCAL machine that has a display.
  # After signing in, copy config/browser-data/ to your server.
  gphotos-auth:
    image: ajkuftic/gphotos-backup:latest
    # build: .
    volumes:
      - ./config:/config
      - /tmp/.X11-unix:/tmp/.X11-unix   # share host X11 socket
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY:-:0}
    network_mode: host   # required for X11 auth to work without xhost tricks
    command: ["--auth-only"]
